# COE892 Decentralized Cryptocurrency
# Services: API (FastAPI + gRPC), RabbitMQ
# Optional: run RabbitMQ with: docker run -d -p 5672:5672 --name rabbitmq rabbitmq

services:
  rabbitmq:
    image: rabbitmq:3-management
    ports:
      - "5672:5672"
      - "15672:15672"
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "check_running"]
      interval: 5s
      timeout: 5s
      retries: 5

  api:
    build: .
    ports:
      - "8000:8000"
      - "50051:50051"
    environment:
      - RABBITMQ_HOST=rabbitmq
      - RABBITMQ_PORT=5672
      - API_HOST=0.0.0.0
      - GRPC_HOST=0.0.0.0
    depends_on:
      rabbitmq:
        condition: service_healthy
    command: ["python", "run.py"]
